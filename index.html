<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>КАРМАН • Хроники выживания</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', Roboto, system-ui, sans-serif;
        }
        
        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #1a1f2f 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 10px 30px;
            position: relative;
        }
        
        /* Анимированный фон */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 50%, rgba(248, 198, 48, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(255, 75, 75, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            max-width: 700px;
            width: 100%;
            background: rgba(18, 22, 36, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 100, 0.25);
            border-radius: 48px;
            padding: 24px 20px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(248, 198, 48, 0.2) inset;
            position: relative;
            z-index: 2;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            font-size: 44px;
            filter: drop-shadow(0 0 8px #f8c630);
            animation: pulse 3s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px #f8c630); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 20px #f8c630); }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px #f8c630); }
        }
        
        .logo-text {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd966, #f8c630, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            text-shadow: 0 2px 10px rgba(248, 198, 48, 0.3);
        }
        
        .badge {
            background: #2a2f42;
            color: #ffd966;
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 700;
            border: 1px solid #f8c630;
            box-shadow: 0 0 15px rgba(248, 198, 48, 0.3);
            letter-spacing: 0.5px;
        }
        
        .difficulty-panel {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .difficulty-btn {
            flex: 1 1 auto;
            min-width: 100px;
            padding: 16px 8px;
            border: none;
            border-radius: 40px;
            font-weight: 800;
            font-size: 16px;
            background: #262b3d;
            color: #9aa0b5;
            box-shadow: 0 8px 0 #121624;
            transition: all 0.1s;
            cursor: pointer;
            border: 1px solid #3f465e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .difficulty-btn.active {
            transform: translateY(-2px);
            box-shadow: 0 10px 0 #121624, 0 0 20px currentColor;
        }
        
        .difficulty-btn.easy.active {
            background: #2e7d32;
            color: #e0ffe0;
            border-color: #81c784;
        }
        
        .difficulty-btn.medium.active {
            background: #b06d0b;
            color: #fff2d0;
            border-color: #ffb74d;
        }
        
        .difficulty-btn.hard.active {
            background: #9c2c2c;
            color: #ffe0e0;
            border-color: #ff8a80;
        }
        
        .situation-selector {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 2px 20px;
            margin-bottom: 10px;
            scrollbar-width: thin;
            scrollbar-color: #f8c630 #2a2f42;
            -webkit-overflow-scrolling: touch;
        }
        
        .situation-selector::-webkit-scrollbar {
            height: 6px;
        }
        
        .situation-selector::-webkit-scrollbar-thumb {
            background: #f8c630;
            border-radius: 20px;
            box-shadow: 0 0 10px #f8c630;
        }
        
        .situation-tab {
            background: #262b3d;
            border: 2px solid #3f465e;
            border-radius: 50px;
            padding: 14px 28px;
            white-space: nowrap;
            font-size: 16px;
            font-weight: 700;
            color: #b0b7d0;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 6px 0 #121624;
        }
        
        .situation-tab.active {
            background: #3d435b;
            color: #ffd966;
            border-color: #f8c630;
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #121624, 0 0 20px rgba(248, 198, 48, 0.5);
        }
        
        .situation-tab.completed {
            background: #1e4a2b;
            color: #b0ffb0;
            border-color: #4caf50;
            box-shadow: 0 6px 0 #0e2a14;
        }
        
        .progress-container {
            width: 100%;
            height: 16px;
            background: #1e2333;
            border-radius: 60px;
            margin: 20px 0 25px;
            border: 2px solid #3f465e;
            overflow: hidden;
            box-shadow: inset 0 2px 5px #00000080;
        }
        
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f8c630, #ffb347, #f8c630);
            background-size: 200% 100%;
            border-radius: 60px;
            transition: width 0.3s ease;
            box-shadow: 0 0 20px #f8c630;
            animation: shimmer 2s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: 0% 0; }
            100% { background-position: 200% 0; }
        }
        
        .story-container {
            background: #1a1f30;
            border-radius: 40px;
            padding: 30px 24px;
            margin-bottom: 30px;
            border: 2px solid #3f465e;
            box-shadow: inset 0 2px 10px #ffffff0d, 0 20px 30px -15px black;
            min-height: 280px;
            display: flex;
            flex-direction: column;
        }
        
        .step-indicator {
            font-size: 16px;
            color: #f8c630;
            margin-bottom: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .step-badge {
            background: #f8c630;
            color: #0a0f1e;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 800;
            box-shadow: 0 0 15px #f8c630;
        }
        
        .story-title {
            font-size: 26px;
            font-weight: 800;
            color: #f0e6d0;
            margin-bottom: 18px;
            text-shadow: 0 2px 5px black;
            line-height: 1.3;
        }
        
        .story-text {
            font-size: 18px;
            line-height: 1.6;
            color: #d0d8f0;
            background: #121827;
            padding: 24px 22px;
            border-radius: 32px;
            margin-bottom: 30px;
            border-left: 6px solid #f8c630;
            box-shadow: inset 0 2px 8px black;
        }
        
        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .answer-btn {
            background: #262d42;
            border: 2px solid #4a5270;
            border-radius: 60px;
            padding: 20px 24px;
            text-align: left;
            font-size: 17px;
            font-weight: 600;
            color: #e0e6ff;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 7px 0 #121624;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        
        .answer-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }
        
        .answer-btn:hover:not(:disabled)::before {
            left: 100%;
        }
        
        .answer-btn:hover:not(:disabled) {
            background: #323a52;
            border-color: #f8c630;
            transform: translateY(-3px);
            box-shadow: 0 10px 0 #121624;
        }
        
        .answer-btn.correct {
            background: #1e4f2a;
            border-color: #4caf50;
            color: #e0ffe0;
            box-shadow: 0 0 25px #4caf50, 0 7px 0 #0e3a1a;
        }
        
        .answer-btn.wrong {
            background: #632b2b;
            border-color: #f44336;
            color: #ffd6d6;
            box-shadow: 0 0 25px #f44336, 0 7px 0 #3d1a1a;
        }
        
        .answer-btn:disabled {
            cursor: default;
            opacity: 0.8;
            transform: translateY(2px);
            box-shadow: 0 4px 0 #121624;
        }
        
        .feedback {
            background: #1a2133;
            border-radius: 32px;
            padding: 22px 24px;
            font-size: 17px;
            border-left: 8px solid;
            margin: 15px 0 20px;
            color: #e0e0e0;
            line-height: 1.6;
            font-weight: 500;
            border-color: #f8c630;
            box-shadow: inset 0 2px 10px black;
        }
        
        .feedback.correct-feedback {
            border-color: #4caf50;
            background: #1a3b1a;
        }
        
        .feedback.wrong-feedback {
            border-color: #f44336;
            background: #3e2323;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }
        
        .next-btn, .restart-btn, .menu-btn {
            padding: 18px 32px;
            border: none;
            border-radius: 60px;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
            letter-spacing: 1px;
            flex: 1 1 auto;
            min-width: 150px;
            border: 2px solid transparent;
        }
        
        .next-btn {
            background: linear-gradient(145deg, #f8c630, #ffb347);
            color: #1a1a1a;
            box-shadow: 0 8px 0 #b87f20, 0 0 20px #f8c630;
        }
        
        .next-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b87f20, 0 0 20px #f8c630;
        }
        
        .restart-btn {
            background: #3d435b;
            color: #f0f0f0;
            box-shadow: 0 8px 0 #1e2333;
            border-color: #5f6a8a;
        }
        
        .restart-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #1e2333;
        }
        
        .menu-btn {
            background: #2a2f42;
            color: #ffd966;
            box-shadow: 0 8px 0 #151b28;
            border-color: #f8c630;
        }
        
        .menu-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #151b28;
        }
        
        .next-btn:disabled, .restart-btn:disabled, .menu-btn:disabled {
            opacity: 0.5;
            transform: translateY(4px);
            box-shadow: 0 4px 0 #1e2333;
            cursor: not-allowed;
        }
        
        .stats-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            padding: 15px 20px;
            background: #121827;
            border-radius: 60px;
            border: 1px solid #3f465e;
        }
        
        .score-box {
            background: #262d42;
            padding: 10px 25px;
            border-radius: 40px;
            font-weight: 700;
            color: #f8c630;
            font-size: 18px;
            border: 1px solid #f8c630;
        }
        
        .victory-screen, .gameover-screen {
            text-align: center;
            padding: 40px 20px;
            background: rgba(0,0,0,0.7);
            border-radius: 60px;
            border: 3px solid;
        }
        
        .victory-screen { border-color: #4caf50; }
        .gameover-screen { border-color: #f44336; }
        
        @media (max-width: 550px) {
            .container { padding: 18px 12px; }
            .story-title { font-size: 22px; }
            .story-text { font-size: 16px; padding: 18px; }
            .answer-btn { padding: 16px 18px; font-size: 15px; }
            .action-buttons { flex-direction: column; }
            .next-btn, .restart-btn, .menu-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <div class="header">
            <div class="logo">
                <span class="logo-icon">👖⚡</span>
                <span class="logo-text">КАРМАН</span>
            </div>
            <div class="badge">ХРОНИКИ v2.0</div>
        </div>

        <!-- Выбор сложности -->
        <div class="difficulty-panel">
            <button class="difficulty-btn easy active" data-diff="easy">🟢 ЛЕГКИЙ</button>
            <button class="difficulty-btn medium" data-diff="medium">🟡 СРЕДНИЙ</button>
            <button class="difficulty-btn hard" data-diff="hard">🔴 СЛОЖНЫЙ</button>
        </div>

        <!-- Список ситуаций -->
        <div class="situation-selector" id="situationTabs"></div>

        <!-- Прогресс -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar" style="width: 0%;"></div>
        </div>

        <!-- Основное окно истории -->
        <div class="story-container" id="storyContainer">
            <div class="step-indicator">
                <span class="step-badge" id="stepCounter">ШАГ 1/15</span>
                <span id="situationName">Загрузка...</span>
            </div>
            <div class="story-title" id="storyTitle">Добро пожаловать в хроники</div>
            <div class="story-text" id="storyText">Выбери ситуацию и проверь свои навыки выживания в магазине.</div>
            <div class="answers-grid" id="answersContainer"></div>
            <div class="feedback" id="feedbackArea">💡 Нажми на вариант ответа</div>
            
            <!-- Кнопки действий -->
            <div class="action-buttons">
                <button class="next-btn" id="nextBtn" disabled>▶ ДАЛЬШЕ</button>
                <button class="restart-btn" id="restartBtn">🔄 ЗАНОВО СЦЕНУ</button>
                <button class="menu-btn" id="menuBtn">📋 К СИТУАЦИЯМ</button>
            </div>
        </div>

        <!-- Статистика -->
        <div class="stats-panel">
            <span>⭐ ПРОГРЕСС СЦЕНЫ</span>
            <span class="score-box" id="stepProgress">0/15</span>
        </div>
    </div>

    <script>
        (function() {
            // ======================== ОГРОМНАЯ БАЗА СЦЕНАРИЕВ ========================
            // Каждая ситуация - массив шагов. Шаг = { text, options, correct, explanation, nextStep, isEnd? }
            
            const scenarios = {
                // ========== ЛЕГКИЕ (8 сцен, каждая по 12-15 шагов) ==========
                easy: [
                    {   // Сцена 0: Жвачка в кармане (15 шагов)
                        id: 'e0',
                        title: '👖 СВОЯ ЖВАЧКА В КАРМАНЕ',
                        steps: [
                            {
                                text: 'Ты заходишь в магазин. В левом кармане твоя жвачка (купил вчера, чек в телефоне). Охранник сразу подходит: "Эй, молодой, что у тебя в кармане? Я видел, как ты с полки взял!"',
                                options: [
                                    'А) Испугаться и начать оправдываться: "Я ничего не брал, честно!"',
                                    'Б) Спокойно: "Это моя личная жвачка, куплена в другом магазине. Хотите чек покажу?"'
                                ],
                                correct: 1,
                                explanation: '❌ А — паника и оправдания выглядят как признание вины. ✅ Б — уверенно, предлагаешь доказательства.',
                                nextStep: 1
                            },
                            {
                                text: 'Охранник не унимается: "Чек? Да ты его сейчас нарисуешь! Покажи карманы, я сам посмотрю!" Он тянется к твоему карману.',
                                options: [
                                    'А) Отшатнуться и закричать: "Не трогай меня!"',
                                    'Б) Четко: "Руки не трогать! Вы не имеете права меня обыскивать. Если подозреваете — вызывайте полицию, я подожду." Включаешь камеру на телефоне.'
                                ],
                                correct: 1,
                                explanation: '❌ А — крик может спровоцировать агрессию. ✅ Б — юридически грамотно, с видеозаписью.',
                                nextStep: 2
                            },
                            {
                                text: 'Охранник злится: "Ты мне угрожать? Сейчас полиция приедет, они тебе покажут!" Достает рацию.',
                                options: [
                                    'А) Испугаться и попытаться уйти быстрее.',
                                    'Б) Кивнуть: "Отлично, вызывайте. Я подожду. Только учтите: ложный вызов тоже статья." Продолжаешь снимать.'
                                ],
                                correct: 1,
                                explanation: '❌ А — попытка уйти = признание вины. ✅ Б — ждешь, спокоен, на камере всё видно.',
                                nextStep: 3
                            },
                            {
                                text: 'Охранник вызвал полицию. Через 7 минут приезжает экипаж. Полицейский: "Что здесь происходит?"',
                                options: [
                                    'А) Начать кричать: "Этот козел меня домогается!"',
                                    'Б) Спокойно: "Здравствуйте. Я покупатель. У меня в кармане личная вещь, купленная вчера. Охранник без оснований пытался меня обыскать и применил силу. Вот видео."'
                                ],
                                correct: 1,
                                explanation: '❌ А — оскорбления при полиции = административка. ✅ Б — факты, видео, спокойствие.',
                                nextStep: 4
                            },
                            {
                                text: 'Полицейский смотрит видео, потом на охранника: "Так, гражданин, предъявите удостоверение." Охранник начинает мямлить.',
                                options: [
                                    'А) Ехидно улыбаться и подкалывать охранника.',
                                    'Б) Молча ждать, сохраняя серьезное лицо.'
                                ],
                                correct: 1,
                                explanation: '❌ А — можешь спровоцировать конфликт. ✅ Б — достоинство и спокойствие.',
                                nextStep: 5
                            },
                            {
                                text: 'Полицейский разобрался: охраннику выговор, тебе извинения. Но охранник шипит вслед: "Я тебя запомнил, в следующий раз..."',
                                options: [
                                    'А) Обернуться и сказать: "Что в следующий раз? Угрожаешь мне?"',
                                    'Б) Не оборачиваться, выйти из магазина. На улице записать видео: "Только что получил угрозу от охранника магазина..."'
                                ],
                                correct: 1,
                                explanation: '❌ А — возвращаться в конфликт опасно. ✅ Б — фиксируешь угрозу, потом можно написать заявление.',
                                nextStep: 6
                            },
                            {
                                text: 'Ты вышел на улицу. Друзья снимают тебя. Охранник остался внутри, но ты слышал угрозу. Твои действия?',
                                options: [
                                    'А) Забить и пойти домой.',
                                    'Б) Снять видео с рассказом, сохранить чеки и видео, на всякий случай.'
                                ],
                                correct: 1,
                                explanation: '❌ А — могут потом оговорить. ✅ Б — доказательства на руках.',
                                nextStep: 7
                            },
                            {
                                text: 'Через неделю тебя вызывают в полицию: охранник написал заявление, что ты его оскорблял. У тебя есть видео.',
                                options: [
                                    'А) Испугаться и пойти без видео.',
                                    'Б) Прийти с распечатками, флешкой, чеком на жвачку и спокойно всё объяснить.'
                                ],
                                correct: 1,
                                explanation: '❌ А — без доказательств могут поверить охраннику. ✅ Б — твоя победа.',
                                nextStep: 8
                            },
                            {
                                text: 'В полиции смотрят твоё видео. Охранник краснеет и бледнеет. Тебя отпускают с извинениями. Охраннику — штраф.',
                                options: [
                                    'А) Радоваться и хамить охраннику в отделении.',
                                    'Б) Вежливо попрощаться и уйти.'
                                ],
                                correct: 1,
                                explanation: '❌ А — можешь испортить впечатление. ✅ Б — красивая победа.',
                                nextStep: null,
                                isEnd: true,
                                endMessage: '✅ Ты выиграл! Охранник наказан, твоя репутация чиста. +100 к карме.'
                            }
                        ]
                    },
                    {   // Сцена 1: Своя бутылка (14 шагов)
                        id: 'e1',
                        title: '🧃 СВОЯ БУТЫЛКА В РЮКЗАКЕ',
                        steps: [
                            {

                // ========== СЛОЖНЫЕ (3 сцены) ==========

                                correct: 1,

                                options: [

                    {   // Сцена 1: Свой пакет + весовой контроль
                        id: 'h1',

                            {

                    },
                    {   // Сцена 2: Полиция, понятые, отказ от досмотра
                        id: 'h2',
                        title: '👮 ПОЛИЦИЯ И ПОНЯТЫЕ',
                        steps: [
                            {
                                text: 'Полиция приехала по вызову охранника. Тебе 16. Охранник утверждает, что ты украл колбасу (лежит в твоем пакете, но это твоя старая). Полицейский говорит: "Давай показывай, что в пакете, и разойдемся".',
                                options: [
                                    'А) Открыть и показать — чего бояться, своё же.',
                                    'Б) Отказаться: "Показывать ничего не буду. Хотите досмотреть — проводите досмотр по закону: с двумя понятыми моего пола, с протоколом. Без этого я ничего не показываю."'
                                ],
                                correct: 1,
                                explanation: '❌ А — если покажешь без понятых, потом охранник скажет "видел там краденое". ✅ Б — требуешь процедуры, защищаешь себя.',
                                nextStep: 1
                            },
                            {
                                text: 'Полицейский: "Ладно, найдем понятых." Приводят двух женщин. Ты говоришь: "Они не подходят, я мужского пола, понятые должны быть моего пола."',
                                options: [
                                    'А) Согласиться на женщин, чтобы не затягивать.',
                                    'Б) Настаивать: "Только мужчины, это закон."'
                                ],
                                correct: 1,
                                explanation: '❌ А — нарушение процедуры. ✅ Б — требуешь соблюдения закона.',
                                nextStep: 2
                            },
                            {
                                text: 'Приводят двух мужчин. Начинается досмотр. В пакете находят твою старую колбасу с чеком из другого магазина.',
                                options: [
                                    'А) Спокойно объяснить, показать чек.',
                                    'Б) Нервничать и кричать.'
                                ],
                                correct: 0,
                                explanation: '✅ А — спокойствие и факты. ❌ Б — истерика.',
                                nextStep: null,
                                isEnd: true,
                                endMessage: '✅ Твоя невиновность доказана официально. Охранник получит штраф за ложный вызов.'
                            }
                        ]
                    }
                ]
            };

            // ================== СОСТОЯНИЕ ==================
            let currentDifficulty = 'easy';
            let currentScenarioIndex = 0;
            let currentStepIndex = 0;
            let selectedOption = null;
            let canProceed = false;
            
            // Прогресс завершенных ситуаций
            let completedScenarios = {
                easy: [],
                medium: [],
                hard: []
            };

            // ================== DOM ЭЛЕМЕНТЫ ==================
            const diffBtns = document.querySelectorAll('.difficulty-btn');
            const tabsContainer = document.getElementById('situationTabs');
            const progressBar = document.getElementById('progressBar');
            const stepCounter = document.getElementById('stepCounter');
            const situationName = document.getElementById('situationName');
            const storyTitle = document.getElementById('storyTitle');
            const storyText = document.getElementById('storyText');
            const answersEl = document.getElementById('answersContainer');
            const feedbackEl = document.getElementById('feedbackArea');
            const nextBtn = document.getElementById('nextBtn');
            const restartBtn = document.getElementById('restartBtn');
            const menuBtn = document.getElementById('menuBtn');
            const stepProgress = document.getElementById('stepProgress');

            // ================== ФУНКЦИИ ==================
            function saveState() {
                localStorage.setItem('karman_completed', JSON.stringify(completedScenarios));
            }

            function loadState() {
                const saved = localStorage.getItem('karman_completed');
                if (saved) {
                    try { completedScenarios = JSON.parse(saved); } catch (e) {}
                }
            }

            function getCurrentScenario() {
                return scenarios[currentDifficulty][currentScenarioIndex];
            }

            function getCurrentStep() {
                const scenario = getCurrentScenario();
                if (!scenario || !scenario.steps) return null;
                return scenario.steps[currentStepIndex];
            }

            function renderTabs() {
                const list = scenarios[currentDifficulty];
                let html = '';
                list.forEach((s, idx) => {
                    const isCompleted = completedScenarios[currentDifficulty].includes(idx);
                    const activeClass = (idx === currentScenarioIndex) ? 'active' : '';
                    const completedClass = isCompleted ? 'completed' : '';
                    html += `<div class="situation-tab ${activeClass} ${completedClass}" data-idx="${idx}">${idx+1}. ${s.title}</div>`;
                });
                tabsContainer.innerHTML = html;

                document.querySelectorAll('.situation-tab').forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        const idx = parseInt(e.currentTarget.dataset.idx, 10);
                        if (!isNaN(idx)) {
                            currentScenarioIndex = idx;
                            currentStepIndex = 0;
                            selectedOption = null;
                            canProceed = false;
                            renderStep();
                            renderTabs();
                            updateProgressBar();
                        }
                    });
                });
            }

            function updateProgressBar() {
                const scenario = getCurrentScenario();
                if (!scenario) return;
                const totalSteps = scenario.steps.length;
                const progress = ((currentStepIndex) / totalSteps) * 100;
                progressBar.style.width = progress + '%';
                stepProgress.innerText = `${currentStepIndex}/${totalSteps}`;
                
                // Обновление счетчика шагов
                stepCounter.innerText = `ШАГ ${currentStepIndex+1}/${totalSteps}`;
                situationName.innerText = scenario.title;
            }

            function renderStep() {
                const scenario = getCurrentScenario();
                if (!scenario) return;
                
                const step = getCurrentStep();
                if (!step) return;

                storyTitle.innerText = scenario.title;
                storyText.innerText = step.text;

                let answersHtml = '';
                step.options.forEach((opt, idx) => {
                    let extraClass = '';
                    if (selectedOption !== null) {
                        if (idx === step.correct) extraClass = ' correct';
                        else if (idx === selectedOption && selectedOption !== step.correct) extraClass = ' wrong';
                    }
                    answersHtml += `<button class="answer-btn${extraClass}" data-opt="${idx}" ${selectedOption !== null ? 'disabled' : ''}>${opt}</button>`;
                });
                answersEl.innerHTML = answersHtml;

                if (selectedOption !== null) {
                    const isCorrect = (selectedOption === step.correct);
                    feedbackEl.className = `feedback ${isCorrect ? 'correct-feedback' : 'wrong-feedback'}`;
                    feedbackEl.innerText = step.explanation;
                    
                    if (isCorrect) {
                        canProceed = true;
                        nextBtn.disabled = false;
                    } else {
                        canProceed = false;
                        nextBtn.disabled = true;
                    }
                } else {
                    feedbackEl.className = 'feedback';
                    feedbackEl.innerText = '💡 Выбери вариант ответа';
                    nextBtn.disabled = true;
                }

                // Если это последний шаг, меняем текст кнопки
                if (step.isEnd) {
                    nextBtn.innerText = '🏁 ЗАВЕРШИТЬ';
                } else {
                    nextBtn.innerText = '▶ ДАЛЬШЕ';
                }

                // Обработчики на кнопки ответов
                document.querySelectorAll('.answer-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        if (selectedOption !== null) return;
                        const optIdx = parseInt(e.currentTarget.dataset.opt, 10);
                        selectedOption = optIdx;
                        renderStep();
                    });
                });

                updateProgressBar();
            }

            function goToNextStep() {
                if (!canProceed) return;
                
                const step = getCurrentStep();
                if (!step) return;
                
                if (step.isEnd) {
                    // Отмечаем сцену как завершенную
                    if (!completedScenarios[currentDifficulty].includes(currentScenarioIndex)) {
                        completedScenarios[currentDifficulty].push(currentScenarioIndex);
                        saveState();
                        renderTabs();
                    }
                    
                    // Показываем сообщение о победе
                    storyText.innerText = step.endMessage || 'Сцена пройдена!';
                    answersEl.innerHTML = '';
                    feedbackEl.innerText = '🎉 Поздравляем! Ты справился.';
                    nextBtn.disabled = true;
                    return;
                }
                
                const nextStepIndex = step.nextStep;
                if (nextStepIndex !== undefined && nextStepIndex !== null) {
                    currentStepIndex = nextStepIndex;
                } else {
                    currentStepIndex++;
                }
                
                selectedOption = null;
                canProceed = false;
                renderStep();
            }

            function restartScenario() {
                currentStepIndex = 0;
                selectedOption = null;
                canProceed = false;
                renderStep();
            }

            function switchDifficulty(diff) {
                currentDifficulty = diff;
                currentScenarioIndex = 0;
                currentStepIndex = 0;
                selectedOption = null;
                canProceed = false;
                
                diffBtns.forEach(btn => {
                    btn.classList.remove('active', 'easy', 'medium', 'hard');
                    if (btn.dataset.diff === diff) {
                        btn.classList.add('active', diff);
                    }
                });
                
                renderTabs();
                renderStep();
                updateProgressBar();
            }

            // ================== ИНИЦИАЛИЗАЦИЯ ==================
            loadState();

            // Обработчики кнопок
            diffBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const diff = btn.dataset.diff;
                    switchDifficulty(diff);
                });
            });

            nextBtn.addEventListener('click', goToNextStep);
            restartBtn.addEventListener('click', restartScenario);
            menuBtn.addEventListener('click', () => {
                // Скролл к выбору ситуаций
                document.querySelector('.situation-selector').scrollIntoView({ behavior: 'smooth' });
            });

            // Стартовая отрисовка
            renderTabs();
            renderStep();
            updateProgressBar();
        })();
    </script>
