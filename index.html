<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>КАРМАН 2.0 • ЖЕСТКИЙ ОТБОР</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }
        
        body {
            background: linear-gradient(145deg, #0c0f1a 0%, #1a1d2b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 15px 10px 30px;
        }
        
        .container {
            max-width: 700px;
            width: 100%;
            background: rgba(18, 22, 36, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid #ffd96660;
            border-radius: 50px;
            padding: 20px;
            box-shadow: 0 25px 50px -10px black;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-icon {
            font-size: 40px;
            filter: drop-shadow(0 0 10px #f8c630);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .logo-text {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd966, #f8c630);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .badge {
            background: #2a2f42;
            color: #ffd966;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 700;
            border: 2px solid #f8c630;
            box-shadow: 0 0 15px #f8c630;
        }
        
        .difficulty-panel {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
        }
        
        .difficulty-btn {
            flex: 1;
            padding: 15px 5px;
            border: none;
            border-radius: 40px;
            font-weight: 800;
            font-size: 16px;
            background: #262b3d;
            color: #9aa0b5;
            box-shadow: 0 6px 0 #121624;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid #3f465e;
        }
        
        .difficulty-btn.active {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #121624, 0 0 20px currentColor;
        }
        
        .difficulty-btn.easy.active { background: #2e7d32; color: white; border-color: #81c784; }
        .difficulty-btn.medium.active { background: #b06d0b; color: white; border-color: #ffb74d; }
        .difficulty-btn.hard.active { background: #9c2c2c; color: white; border-color: #ff8a80; }
        
        .situation-selector {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0 20px;
            scrollbar-width: thin;
            scrollbar-color: #f8c630 #2a2f42;
        }
        
        .situation-selector::-webkit-scrollbar {
            height: 5px;
        }
        
        .situation-selector::-webkit-scrollbar-thumb {
            background: #f8c630;
            border-radius: 20px;
        }
        
        .situation-tab {
            background: #262b3d;
            border: 2px solid #3f465e;
            border-radius: 40px;
            padding: 12px 25px;
            white-space: nowrap;
            font-weight: 700;
            color: #b0b7d0;
            cursor: pointer;
            box-shadow: 0 5px 0 #121624;
            transition: all 0.1s;
        }
        
        .situation-tab.active {
            background: #3d435b;
            color: #ffd966;
            border-color: #f8c630;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #121624, 0 0 15px #f8c630;
        }
        
        .situation-tab.completed {
            background: #1e4a2b;
            color: #b0ffb0;
            border-color: #4caf50;
        }
        
        .progress-container {
            width: 100%;
            height: 14px;
            background: #1e2333;
            border-radius: 60px;
            margin: 15px 0 25px;
            border: 2px solid #3f465e;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #f8c630, #ffb347);
            width: 0%;
            transition: width 0.3s;
            box-shadow: 0 0 15px #f8c630;
        }
        
        .story-card {
            background: #1a1f30;
            border-radius: 40px;
            padding: 25px 20px;
            border: 2px solid #3f465e;
            margin-bottom: 25px;
            box-shadow: inset 0 2px 10px #ffffff0d;
        }
        
        .step-counter {
            color: #f8c630;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .step-badge {
            background: #f8c630;
            color: black;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 14px;
        }
        
        .story-title {
            font-size: 24px;
            font-weight: 800;
            color: #f0e6d0;
            margin-bottom: 20px;
        }
        
        .story-text {
            font-size: 17px;
            line-height: 1.6;
            color: #d0d8f0;
            background: #121827;
            padding: 20px;
            border-radius: 30px;
            margin-bottom: 25px;
            border-left: 6px solid #f8c630;
        }
        
        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .answer-btn {
            background: #262d42;
            border: 2px solid #4a5270;
            border-radius: 50px;
            padding: 18px 20px;
            text-align: left;
            font-size: 16px;
            font-weight: 500;
            color: #e0e6ff;
            cursor: pointer;
            box-shadow: 0 6px 0 #121624;
            transition: all 0.1s;
            width: 100%;
            position: relative;
        }
        
        .answer-btn:hover:not(:disabled) {
            background: #323a52;
            border-color: #f8c630;
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #121624;
        }
        
        .answer-btn.correct {
            background: #1e4f2a;
            border-color: #4caf50;
            color: #e0ffe0;
            box-shadow: 0 0 20px #4caf50, 0 6px 0 #0e3a1a;
        }
        
        .answer-btn.wrong {
            background: #632b2b;
            border-color: #f44336;
            color: #ffd6d6;
            box-shadow: 0 0 20px #f44336, 0 6px 0 #3d1a1a;
        }
        
        .answer-btn:disabled {
            opacity: 0.8;
            cursor: default;
        }
        
        .feedback {
            background: #1a2133;
            border-radius: 30px;
            padding: 18px 20px;
            border-left: 8px solid;
            margin: 15px 0;
            color: #e0e0e0;
            line-height: 1.5;
        }
        
        .feedback.correct { border-color: #4caf50; background: #1a3b1a; }
        .feedback.wrong { border-color: #f44336; background: #3e2323; }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        .next-btn, .restart-btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 60px;
            font-weight: 800;
            font-size: 17px;
            cursor: pointer;
            transition: 0.1s;
            text-transform: uppercase;
        }
        
        .next-btn {
            background: #f8c630;
            color: #1a1a1a;
            box-shadow: 0 7px 0 #b87f20;
        }
        
        .next-btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #b87f20;
        }
        
        .restart-btn {
            background: #3d435b;
            color: white;
            box-shadow: 0 7px 0 #1e2333;
        }
        
        .restart-btn:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #1e2333;
        }
        
        .next-btn:disabled {
            opacity: 0.5;
            transform: translateY(4px);
            box-shadow: 0 3px 0 #b87f20;
            cursor: not-allowed;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding: 15px;
            background: #121827;
            border-radius: 40px;
        }
        
        @media (max-width: 550px) {
            .action-buttons { flex-direction: column; }
            .answer-btn { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">

        <div class="situation-selector" id="situationTabs"></div>

        <div class="progress-container">

            <div class="answers-grid" id="answersContainer"></div>
            <div class="feedback" id="feedbackArea">💡 Выбери вариант ответа</div>
            <div class="action-buttons">
                <button class="next-btn" id="nextBtn" disabled>▶ ДАЛЬШЕ</button>
                <button class="restart-btn" id="restartBtn">🔄 ЗАНОВО</button>
            </div>
        </div>

        <div class="stats">
            <span>📊 ПРОГРЕСС СЦЕНЫ</span>
            <span id="stepProgress">0/10</span>

                                text: 'Охранник схватил тебя, прижал к стене и прошипел: "Щас так вмажу, что мало не покажется, щенок!"',
                                options: [
                                    'А) Ударить его в ответ, защищаясь',
                                    'Б) Закричать: "Отпусти, козел!"',
                                    'В) Спокойно: "Вы угрожаете мне убийством. Это ст. 119 УК. Я записываю"',
                                    'Г) Заплакать и просить не бить'
                                ],
                                correct: 2
                            },
                            {
                                text: 'Он немного ослабил хватку, но не отпускает',
                                options: [
                                    'А) Вырваться и убежать',
                                    'Б) Продолжать снимать и говорить: "Фиксирую незаконное задержание"',
                                    'В) Начать орать, звать на помощь',
                                    'Г) Плюнуть в него'
                                ],
                                correct: 1
                            },
                            {
                                text: 'Подходят друзья с камерами. Охранник отпускает, но говорит: "Вали отсюда"',
                                options: [
                                    'А) Уйти и забыть',
                                    'Б) Сразу вызвать полицию и показать видео',
                                    'В) Начать угрожать ему в ответ',
                                    'Г) Остаться и провоцировать дальше'
                                ],
                                correct: 1
                            },
                            {
                                text: 'Полиция приехала. Твои действия?',
                                options: [
                                    'А) Рассказать всё, показать видео, написать заявление',
                                    'Б) Сказать, что всё уже нормально',
                                    'В) Обвинить охранника во всех грехах',
                                    'Г) Молчать, пусть адвокат говорит'
                                ],
                                correct: 0,
                                last: true
                            }
                        ]
                    },
                    {
                        id: 'h3',
                        title: '🔥 СУПЕР-СЛОЖНАЯ: ОЛИМПИАДА',
                        steps: [
                            {
                                text: 'Охранник толкнул тебя, ты упал на колено. Сильно болит. Завтра у тебя областная олимпиада по физкультуре, к которой ты готовился 5 лет. Твои действия СРАЗУ после падения?',
                                options: [
                                    'А) Вскочить и наброситься на охранника с кулаками',
                                    'Б) Остаться лежать, закричать: "Помогите, мне больно!"',
                                    'В) Включить камеру, громко сказать: "Меня толкнули, я упал на колено. У меня завтра олимпиада. Вызываю полицию и скорую"',
                                    'Г) Встать, отряхнуться и уйти, чтобы не связываться'
                                ],
                                correct: 2
                            },
                            {
                                text: 'Охранник: "Вставай, не притворяйся!"',
                                options: [
                                    'А) "Я не притворяюсь. Вы причинили мне боль. Я фиксирую всё на видео"',
                                    'Б) Встать и дать ему пощечину',
                                    'В) Заплакать и просить вызвать скорую',
                                    'Г) Промолчать и пытаться встать'
                                ],
                                correct: 0
                            },
                            {
                                text: 'Приехала скорая. Врач спрашивает, что случилось',
                                options: [
                                    'А) "Меня толкнул охранник, упал на колено. Завтра олимпиада, мне нужно, чтобы зафиксировали травму"',
                                    'Б) "Просто упал сам"',
                                    'В) "Не знаю, просто больно"',
                                    'Г) "Ничего не буду говорить"'
                                ],
                                correct: 0
                            },
                            {
                                text: 'В травмпункте дали справку: ушиб колена. Врач сказал: "Бежать нельзя, нужен покой". Олимпиада завтра. Твои действия?',
                                options: [
                                    'А) Поехать на олимпиаду и попытаться бежать через боль',
                                    'Б) Сразу поехать в полицию с видео и справкой, написать заявление',
                                    'В) Поехать домой и лечиться, забыв про олимпиаду',
                                    'Г) Позвонить родителям и попросить совета'
                                ],
                                correct: 1
                            },
                            {
                                text: 'В полиции приняли заявление. Ты пропустил олимпиаду. Через месяц суд. Что скажешь судье?',
                                options: [
                                    'А) "Я готовился 5 лет, мечтал, тренировался каждый день. Из-за этого охранника я потерял всё"',
                                    'Б) "Он меня толкнул, я упал" (коротко)',
                                    'В) "Пусть заплатит мне миллион"',
                                    'Г) "Я не знаю, что сказать"'
                                ],
                                correct: 0,
                                last: true
                            }
                        ]
                    }
                ]
            };

            // ================== СОСТОЯНИЕ ==================
            let currentDifficulty = 'easy';
            let currentScenarioIndex = 0;
            let currentStepIndex = 0;
            let selectedOption = null;
            let completedScenarios = {easy: [], medium: [], hard: []};

            // ================== DOM ==================
            const diffBtns = document.querySelectorAll('.difficulty-btn');
            const tabsContainer = document.getElementById('situationTabs');
            const progressBar = document.getElementById('progressBar');
            const stepCounter = document.getElementById('stepCounter');
            const situationName = document.getElementById('situationName');
            const storyTitle = document.getElementById('storyTitle');
            const storyText = document.getElementById('storyText');
            const answersEl = document.getElementById('answersContainer');
            const feedbackEl = document.getElementById('feedbackArea');
            const nextBtn = document.getElementById('nextBtn');
            const restartBtn = document.getElementById('restartBtn');
            const stepProgress = document.getElementById('stepProgress');

            function getCurrentScenario() {
                return scenarios[currentDifficulty][currentScenarioIndex];
            }

            function getCurrentStep() {
                return getCurrentScenario().steps[currentStepIndex];
            }

            function renderTabs() {
                const list = scenarios[currentDifficulty];
                let html = '';
                list.forEach((s, idx) => {
                    const completed = completedScenarios[currentDifficulty].includes(idx);
                    html += `<div class="situation-tab ${idx === currentScenarioIndex ? 'active' : ''} ${completed ? 'completed' : ''}" data-idx="${idx}">${idx+1}. ${s.title}</div>`;
                });
                tabsContainer.innerHTML = html;
                
                document.querySelectorAll('.situation-tab').forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        currentScenarioIndex = +e.currentTarget.dataset.idx;
                        currentStepIndex = 0;
                        selectedOption = null;
                        renderStep();
                        renderTabs();
                    });
                });
            }

            function updateProgress() {
                const steps = getCurrentScenario().steps.length;
                const progress = (currentStepIndex / steps) * 100;
                progressBar.style.width = progress + '%';
                stepCounter.innerText = `ШАГ ${currentStepIndex+1}/${steps}`;
                situationName.innerText = getCurrentScenario().title;
                stepProgress.innerText = `${currentStepIndex}/${steps}`;
            }

            function renderStep() {
                const step = getCurrentStep();
                if (!step) return;
                
                storyTitle.innerText = getCurrentScenario().title;
                storyText.innerText = step.text;

                let html = '';
                step.options.forEach((opt, idx) => {
                    let cls = '';
                    if (selectedOption !== null) {
                        if (idx === step.correct) cls = 'correct';
                        else if (idx === selectedOption) cls = 'wrong';
                    }
                    html += `<button class="answer-btn ${cls}" data-opt="${idx}" ${selectedOption !== null ? 'disabled' : ''}>${opt}</button>`;
                });
                answersEl.innerHTML = html;

                if (selectedOption !== null) {
                    const isCorrect = selectedOption === step.correct;
                    feedbackEl.className = `feedback ${isCorrect ? 'correct' : 'wrong'}`;
                    
                    // Генерируем пояснение в зависимости от правильности
                    if (isCorrect) {
                        feedbackEl.innerText = '✅ АБСОЛЮТНО ВЕРНО! Ты выбрал правильную тактику. Идем дальше.';
                    } else {
                        feedbackEl.innerText = '❌ НЕПРАВИЛЬНО! Этот выбор приведет к проблемам. Попробуй другой вариант.';
                    }
                    
                    nextBtn.disabled = !isCorrect;
                } else {
                    feedbackEl.className = 'feedback';
                    feedbackEl.innerText = '💡 ВСЕ ВАРИАНТЫ ПОХОЖИ, НО ТОЛЬКО ОДИН ПРАВИЛЬНЫЙ. Выбери с умом.';
                    nextBtn.disabled = true;
                }

                nextBtn.innerText = step.last ? '🏁 ЗАВЕРШИТЬ' : '▶ ДАЛЬШЕ';

                document.querySelectorAll('.answer-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        if (selectedOption !== null) return;
                        selectedOption = +e.currentTarget.dataset.opt;
                        renderStep();
                    });
                });

                updateProgress();
            }

            function goToNext() {
                if (!nextBtn.disabled) {
                    const step = getCurrentStep();
                    if (step.last) {
                        if (!completedScenarios[currentDifficulty].includes(currentScenarioIndex)) {
                            completedScenarios[currentDifficulty].push(currentScenarioIndex);
                        }
                        currentStepIndex = 0;
                        selectedOption = null;
                        renderTabs();
                        renderStep();
                    } else {
                        currentStepIndex++;
                        selectedOption = null;
                        renderStep();
                    }
                }
            }

            function restartScene() {
                currentStepIndex = 0;
                selectedOption = null;
                renderStep();
            }

            diffBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const diff = btn.dataset.diff;
                    currentDifficulty = diff;
                    currentScenarioIndex = 0;
                    currentStepIndex = 0;
                    selectedOption = null;
                    
                    diffBtns.forEach(b => b.classList.remove('active', 'easy', 'medium', 'hard'));
                    btn.classList.add('active', diff);
                    
                    renderTabs();
                    renderStep();
                });
            });

            nextBtn.addEventListener('click', goToNext);
            restartBtn.addEventListener('click', restartScene);

            // Старт
            renderTabs();
            renderStep();
        })();
    </script>
</body>
</html>
